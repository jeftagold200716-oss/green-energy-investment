<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | J-TECH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .admin-view { display: none; }
        .admin-view.active { display: block; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-100 pb-24">

    <div class="bg-slate-900 text-white p-6 rounded-b-[2rem] shadow-lg mb-6">
        <h1 id="view-title" class="text-2xl font-black uppercase tracking-tighter">Publish Product</h1>
        <p class="text-emerald-400 text-[10px] font-bold uppercase tracking-widest">Admin Control System</p>
    </div>

    <div class="max-w-xl mx-auto px-4">
        
        <section id="view-publish" class="admin-view active space-y-4">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm">
                <div class="space-y-4">
                    <input type="text" id="p_name" placeholder="Product Name" class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 font-bold text-slate-800">
                    <input type="number" id="p_price" placeholder="Price (₦)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none">
                    <input type="number" id="p_daily" placeholder="Daily Return (₦)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none">
                    <input type="number" id="p_duration" placeholder="Duration (Days)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none">
                    <button onclick="publishProduct()" class="w-full bg-emerald-600 text-white font-black py-5 rounded-2xl shadow-lg active:scale-95 transition-transform">PUSH TO WEBSITE</button>
                </div>
            </div>
        </section>

        <section id="view-deposits" class="admin-view space-y-4">
            <div id="deposit-list" class="space-y-3">
                </div>
        </section>

        <section id="view-withdraws" class="admin-view space-y-4">
            <div id="withdraw-list" class="space-y-3">
                </div>
        </section>

        <section id="view-users" class="admin-view space-y-4">
            <div class="grid grid-cols-3 gap-2">
                <div class="bg-white p-4 rounded-2xl text-center shadow-sm">
                    <p class="text-[8px] font-bold text-slate-400 uppercase">Total Users</p>
                    <p id="u-total" class="font-black text-emerald-600 text-lg">0</p>
                </div>
            </div>
            <div class="bg-white p-6 rounded-[2rem] shadow-sm">
                <canvas id="userChart" style="max-height: 250px;"></canvas>
            </div>
        </section>

        <section id="view-revenue" class="admin-view space-y-4">
            <div class="bg-slate-900 p-6 rounded-[2rem] text-white shadow-xl">
                <p class="text-[10px] font-bold uppercase text-slate-400">Total Deposits</p>
                <h3 id="rev-in" class="text-3xl font-black">₦0.00</h3>
                <hr class="my-4 border-slate-700">
                <p class="text-[10px] font-bold uppercase text-slate-400">Total Payouts</p>
                <h3 id="rev-out" class="text-3xl font-black text-red-400">₦0.00</h3>
            </div>
        </section>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex justify-around items-center p-3 z-[999] shadow-2xl overflow-x-auto no-scrollbar">
        <button onclick="switchView('publish', 'Publish Product')" class="nav-btn text-emerald-600 flex flex-col items-center min-w-[70px]">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
            <span class="text-[8px] font-bold uppercase">Product</span>
        </button>
        <button onclick="switchView('deposits', 'Deposits')" class="nav-btn text-slate-400 flex flex-col items-center min-w-[70px]">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 11l3-3m0 0l3 3m-3-3v8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
            <span class="text-[8px] font-bold uppercase">Deposits</span>
        </button>
        <button onclick="switchView('withdraws', 'Withdraws')" class="nav-btn text-slate-400 flex flex-col items-center min-w-[70px]">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 13l-3 3m0 0l-3-3m3 3V8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
            <span class="text-[8px] font-bold uppercase">Withdraws</span>
        </button>
        <button onclick="switchView('users', 'User Stats')" class="nav-btn text-slate-400 flex flex-col items-center min-w-[70px]">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
            <span class="text-[8px] font-bold uppercase">Users</span>
        </button>
        <button onclick="switchView('revenue', 'Financials')" class="nav-btn text-slate-400 flex flex-col items-center min-w-[70px]">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 7h8m0 0v8m0-8l-8 8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
            <span class="text-[8px] font-bold uppercase">Revenue</span>
        </button>
    </nav>

    <script>
const _supabase = supabase.createClient('https://sbxtpvuieiokjawltqjq.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNieHRwdnVpZWlva2phd2x0cWpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MDEwMzEsImV4cCI6MjA5Mzk3NzAzMX0.G-BtkLvLgswoxhQlRS7k68ykHb9EUWBrXSg1PVq3pgY');

        function switchView(viewId, title) {
            document.querySelectorAll('.admin-view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            document.getElementById('view-title').innerText = title;
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.replace('text-emerald-600', 'text-slate-400');
            });
            // Fixed event targeting
            if (event) {
                event.currentTarget.classList.replace('text-slate-400', 'text-emerald-600');
            }

            if(viewId === 'deposits') loadDeposits();
            if(viewId === 'withdraws') loadWithdraws();
            if(viewId === 'users') loadUserStats();
            if(viewId === 'revenue') loadRevenue();
        }

        async function publishProduct() {
            const name = document.getElementById('p_name').value;
            const price = document.getElementById('p_price').value;
            const daily = document.getElementById('p_daily').value;
            const validity = document.getElementById('p_duration').value; 
            if(!name || !price || !daily || !validity) return alert("Fill all fields!");

            const { error } = await _supabase.from('products').insert([{ 
                name, price: Number(price), daily_return: Number(daily), validity_days: Number(validity), status: 'active' 
            }]);
            if (error) alert(error.message);
            else { alert("Product Live!"); location.reload(); }
        }

       // --- DEPOSIT HANDLING ---
async function loadDeposits() {
    const { data, error } = await _supabase.from('deposits').select('*').eq('status', 'pending').order('created_at', { ascending: false });
    if (error) return console.error(error);
    
    const list = document.getElementById('deposit-list');
    list.innerHTML = data.map(d => `
        <div id="dep-${d.id}" class="bg-white p-5 rounded-3xl shadow-sm border border-slate-50">
            <p class="text-[10px] font-black text-emerald-600 uppercase tracking-widest mb-1">${d.reference || 'Manual'}</p>
            <h4 class="font-black text-slate-800 text-lg">₦${Number(d.amount).toLocaleString()}</h4>
            <p class="text-[10px] text-slate-400 font-bold mb-4">Phone: ${d.phone_number || 'N/A'}</p>
            <div class="flex gap-2">
                <button onclick="handleDeposit('${d.id}', '${d.user_id}', ${d.amount}, 'approved')" class="flex-1 bg-emerald-600 text-white py-3 rounded-xl font-black text-[10px]">APPROVE</button>
                <button onclick="handleDeposit('${d.id}', '${d.user_id}', ${d.amount}, 'rejected')" class="flex-1 bg-rose-50 text-rose-600 py-3 rounded-xl font-black text-[10px]">REJECT</button>
            </div>
        </div>
    `).join('') || '<p class="text-center py-10 text-slate-400 font-bold uppercase text-[10px]">No pending deposits</p>';
}

async function handleDeposit(id, uid, amt, status) {
    // 1. INSTANT DISAPPEAR
    const element = document.getElementById(`dep-${id}`);
    if (element) element.style.display = 'none';

    try {
        if (status === 'approved') {
            // 2. Fetch profile without using .single() to avoid the "coerce" error
            const { data: profiles, error: pError } = await _supabase
                .from('profiles')
                .select('balance')
                .eq('id', uid);
            
            if (pError) throw new Error("Database error: " + pError.message);
            
            // Check if the user actually exists in the profiles table
            if (!profiles || profiles.length === 0) {
                throw new Error("User profile not found. The user might have been deleted.");
            }

            const currentBalance = Number(profiles[0].balance || 0);
            const newBalance = currentBalance + Number(amt);

            // 3. Update user balance
            const { error: uError } = await _supabase
                .from('profiles')
                .update({ balance: newBalance })
                .eq('id', uid);

            if (uError) throw new Error("Balance update failed: " + uError.message);
        }

        // 4. Finalize the deposit status
        const { error: dError } = await _supabase
            .from('deposits')
            .update({ status: status })
            .eq('id', id);

        if (dError) throw dError;

        loadRevenue(); 
        
    } catch (err) {
        // If it fails, bring it back so you can try again or see the error
        if (element) element.style.display = 'block';
        console.error(err);
        alert("Wait! " + err.message);
    }
}
        async function loadWithdraws() {
            const { data, error } = await _supabase.from('withdrawals').select('*').eq('status', 'pending').order('created_at', { ascending: false });
            if (error) return;
            
            const list = document.getElementById('withdraw-list');
            list.innerHTML = data.map(w => `
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-50">
                    <p class="text-lg font-black text-rose-600 mb-1">₦${Number(w.amount).toLocaleString()}</p>
                    <p class="text-[10px] font-bold text-slate-500">${w.bank_name} | ${w.account_number}</p>
                    <p class="text-[10px] font-black text-slate-800 uppercase mt-1">${w.account_name}</p>
                    <div class="flex gap-2 mt-4">
                        <button onclick="handleWithdraw('${w.id}', '${w.user_id}', ${w.amount}, 'success')" class="flex-1 bg-slate-900 text-white py-3 rounded-xl font-black text-[10px]">PAID</button>
                        <button onclick="handleWithdraw('${w.id}', '${w.user_id}', ${w.amount}, 'rejected')" class="flex-1 bg-rose-50 text-rose-600 py-3 rounded-xl font-black text-[10px]">REJECT</button>
                    </div>
                </div>
            `).join('') || '<p class="text-center py-10 text-slate-400 font-bold uppercase text-[10px]">No pending withdrawals</p>';
        }

        async function handleWithdraw(id, uid, amt, status) {
            try {
                if (status === 'rejected') {
                    const { data: profile } = await _supabase.from('profiles').select('balance').eq('id', uid).single();
                    const newBalance = (Number(profile.balance) || 0) + Number(amt);
                    await _supabase.from('profiles').update({ balance: newBalance }).eq('id', uid);
                }
                await _supabase.from('withdrawals').update({ status: status }).eq('id', id);
                alert("Withdrawal updated!");
                loadWithdraws();
                loadRevenue();
            } catch (err) {
                alert(err.message);
            }
        }

        async function loadUserStats() {
            const { data: users } = await _supabase.from('profiles').select('id');
            if (users) document.getElementById('u-total').innerText = users.length;
        }

        async function loadRevenue() {
            const { data: dep } = await _supabase.from('deposits').select('amount').eq('status', 'approved');
            const { data: wit } = await _supabase.from('withdrawals').select('amount').eq('status', 'success');
            const totalIn = dep ? dep.reduce((a, c) => a + Number(c.amount), 0) : 0;
            const totalOut = wit ? wit.reduce((a, c) => a + Number(c.amount), 0) : 0;
            document.getElementById('rev-in').innerText = '₦' + totalIn.toLocaleString();
            document.getElementById('rev-out').innerText = '₦' + totalOut.toLocaleString();
        }

        window.onload = () => { loadRevenue(); };
    </script>
</body>
</html>
