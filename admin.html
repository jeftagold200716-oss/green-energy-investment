<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Energy | Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-slate-800 pb-5">
            <h1 class="text-2xl font-black text-emerald-500 tracking-tighter">MASTER ADMIN</h1>
            <button onclick="location.reload()" class="bg-slate-800 px-4 py-2 rounded-lg text-sm">Refresh Data</button>
        </header>

        <!-- Section 1: Publish Products -->
        <section class="bg-slate-800 rounded-3xl p-6 mb-10 border border-emerald-500/20 shadow-xl">
            <h2 class="text-xl font-bold mb-4 text-emerald-400">Publish New Solar Tier</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="p_name" placeholder="Tier Name (e.g. Solar Pro)" class="bg-slate-700 p-4 rounded-2xl outline-none border border-slate-600 focus:border-emerald-500">
                <input type="number" id="p_price" placeholder="Price (₦)" class="bg-slate-700 p-4 rounded-2xl outline-none border border-slate-600 focus:border-emerald-500">
                <input type="number" id="p_return" placeholder="Daily Return (₦)" class="bg-slate-700 p-4 rounded-2xl outline-none border border-slate-600 focus:border-emerald-500">
            </div>
            <button onclick="publishProduct()" class="mt-4 w-full md:w-auto bg-emerald-600 px-10 py-4 rounded-2xl font-black hover:bg-emerald-500 transition-all shadow-lg shadow-emerald-900/20">PUBLISH TO SITE</button>
        </section>

        <!-- Section 2: Pending Deposits -->
        <section class="mb-10">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                <span class="w-2 h-2 bg-yellow-500 rounded-full animate-pulse"></span>
                Pending Deposit Requests
            </h2>
            <div class="overflow-x-auto bg-slate-800 rounded-3xl border border-slate-700">
                <table class="w-full text-left">
                    <thead class="bg-slate-700/50 text-slate-400 uppercase text-xs">
                        <tr>
                            <th class="p-5">Sender Name</th>
                            <th class="p-5">Amount</th>
                            <th class="p-5">Date</th>
                            <th class="p-5 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="deposit-list">
                        <!-- Loaded by JS -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Section 3: Withdrawal Requests -->
        <section>
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2 text-red-400">
                <span class="w-2 h-2 bg-red-500 rounded-full"></span>
                Withdrawal Requests (20% Fee Applied)
            </h2>
            <div class="overflow-x-auto bg-slate-800 rounded-3xl border border-slate-700">
                <table class="w-full text-left">
                    <thead class="bg-slate-700/50 text-slate-400 uppercase text-xs">
                        <tr>
                            <th class="p-5">Bank Details</th>
                            <th class="p-5">Gross Amount</th>
                            <th class="p-5 text-emerald-400">Net Payable</th>
                            <th class="p-5 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="withdraw-list">
                        <!-- Loaded by JS -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="admin.js"></script>
</body>
</html>
