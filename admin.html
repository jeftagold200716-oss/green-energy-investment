<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 font-sans p-4">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-black text-slate-800 mb-8">Admin Dashboard</h1>

        <!-- PRODUCT PUBLISHING SECTION -->
        <section class="bg-white p-6 rounded-3xl shadow-sm mb-8">
            <h2 class="text-lg font-bold mb-4">Publish New Product</h2>
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="p_name" placeholder="Product Name" class="p-3 bg-slate-50 rounded-xl border">
                <input type="number" id="p_price" placeholder="Price (₦)" class="p-3 bg-slate-50 rounded-xl border">
                <input type="number" id="p_return" placeholder="Daily Return (₦)" class="p-3 bg-slate-50 rounded-xl border">
                <input type="number" id="p_days" placeholder="Duration (Days)" class="p-3 bg-slate-50 rounded-xl border">
            </div>
            <button onclick="publishProduct()" class="w-full mt-4 bg-slate-900 text-white py-4 rounded-xl font-bold">PUBLISH TO USERS</button>
        </section>

        <!-- DEPOSITS SECTION -->
        <div class="mb-8">
            <h2 class="text-lg font-bold mb-4 text-emerald-600">Pending Deposits</h2>
            <div id="deposit-list" class="space-y-3"></div>
        </div>

        <!-- WITHDRAWALS SECTION -->
        <div>
            <h2 class="text-lg font-bold mb-4 text-blue-600">Pending Withdrawals</h2>
            <div id="withdraw-list" class="space-y-3"></div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://sbxtpvuieiokjawltqjq.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNieHRwdnVpZWlva2phd2x0cWpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MDEwMzEsImV4cCI6MjA5Mzk3NzAzMX0.G-BtkLvLgswoxhQlRS7k68ykHb9EUWBrXSg1PVq3pgY');

        // --- PRODUCT LOGIC ---
        async function publishProduct() {
            const name = document.getElementById('p_name').value;
            const price = document.getElementById('p_price').value;
            const daily = document.getElementById('p_return').value;
            const days = document.getElementById('p_days').value;

            const { error } = await _supabase.from('products').insert([{ name, price, daily_return: daily, duration_days: days }]);
            if (error) alert(error.message);
            else alert("Product Live!");
        }

        // --- LOAD DATA ---
        async function loadAdminData() {
            // Fetch Pending Deposits
            const { data: deps } = await _supabase.from('deposits').select('*').eq('status', 'pending');
            let depHtml = '';
            deps?.forEach(d => {
                depHtml += `<div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border-l-4 border-emerald-500">
                    <div>
                        <p class="font-bold">${d.phone_number}</p>
                        <p class="text-xs text-slate-400">${new Date(d.created_at).toLocaleString()}</p>
                        <p class="text-emerald-600 font-black">₦${d.amount}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="approveDep('${d.id}', '${d.user_id}', ${d.amount})" class="bg-emerald-500 text-white px-4 py-2 rounded-lg text-xs font-bold">Approve</button>
                        <button onclick="updateStatus('deposits', '${d.id}', 'rejected')" class="bg-slate-100 text-slate-400 px-4 py-2 rounded-lg text-xs font-bold">Reject</button>
                    </div>
                </div>`;
            });
            document.getElementById('deposit-list').innerHTML = depHtml || '<p class="text-slate-400">No deposits</p>';

            // Fetch Pending Withdrawals
            const { data: wits } = await _supabase.from('withdrawals').select('*').eq('status', 'pending');
            let witHtml = '';
            wits?.forEach(w => {
                witHtml += `<div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-blue-500">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <p class="font-bold">₦${w.amount}</p>
                            <p class="text-xs text-slate-400">${new Date(w.created_at).toLocaleString()}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="approveWit('${w.id}', '${w.user_id}', ${w.amount})" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-bold">Confirm Paid</button>
                            <button onclick="updateStatus('withdrawals', '${w.id}', 'rejected')" class="bg-slate-100 text-slate-400 px-4 py-2 rounded-lg text-xs font-bold">Reject</button>
                        </div>
                    </div>
                    <div class="bg-slate-50 p-3 rounded-xl text-[11px] text-slate-600">
                        <p>Bank: ${w.bank_name}</p>
                        <p>Acc: ${w.account_number}</p>
                        <p>Name: ${w.account_name}</p>
                    </div>
                </div>`;
            });
            document.getElementById('withdraw-list').innerHTML = witHtml || '<p class="text-slate-400">No withdrawals</p>';
        }

        async function approveDep(id, uid, amt) {
            await _supabase.rpc('approve_deposit', { target_deposit_id: id, target_user_id: uid, deposit_amount: amt });
            loadAdminData();
        }

        async function approveWit(id, uid, amt) {
            await _supabase.rpc('approve_withdrawal', { target_id: id, target_user_id: uid, withdraw_amount: amt });
            loadAdminData();
        }

        async function updateStatus(table, id, status) {
            await _supabase.from(table).update({ status }).eq('id', id);
            loadAdminData();
        }

        loadAdminData();
    </script>
</body>
</html>
