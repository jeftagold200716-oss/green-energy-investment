<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account | Green Energy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tier-card { transition: all 0.3s ease; }
        .tier-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-slate-50 pb-32">

    <div class="max-w-lg mx-auto p-6">
        <h1 class="text-3xl font-black text-slate-800 mb-6 tracking-tighter">Profile</h1>

        <div class="bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-xl mb-6 relative overflow-hidden">
            <div class="relative z-10">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-emerald-400 text-[10px] font-bold uppercase tracking-widest opacity-80">Available Balance</p>
                        <h2 id="acc_balance" class="text-4xl font-black mt-1 tracking-tight">₦0.00</h2>
                        
                        <p class="text-slate-400 text-[10px] font-bold uppercase mt-4 tracking-widest">Total Income</p>
                        <p id="total_income" class="text-lg font-black text-emerald-400">₦0.00</p>
                    </div>
                    <div class="text-right">
                        <span id="current_tier_badge" class="bg-emerald-500 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-tighter">Tier 1</span>
                        <button onclick="openTierModal()" class="block mt-4 bg-white/10 hover:bg-white/20 text-white text-[9px] font-black uppercase px-4 py-2 rounded-xl transition-all border border-white/10">
                            Upgrade Tier
                        </button>
                    </div>
                </div>
            </div>
            <div class="absolute -bottom-10 -right-10 w-32 h-32 bg-emerald-500/10 rounded-full blur-3xl"></div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-8">
            <button onclick="showSection('products')" class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex flex-col items-center gap-2 hover:bg-slate-50 transition-all">
                <div class="w-10 h-10 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-500">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
                </div>
                <span class="text-[10px] font-black uppercase text-slate-600">My Products</span>
            </button>
            <button onclick="showSection('deposits')" class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex flex-col items-center gap-2 hover:bg-slate-50 transition-all">
                <div class="w-10 h-10 bg-emerald-50 rounded-2xl flex items-center justify-center text-emerald-500">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <span class="text-[10px] font-black uppercase text-slate-600">Deposit History</span>
            </button>
            <button onclick="showSection('withdrawals')" class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex flex-col items-center gap-2 hover:bg-slate-50 transition-all">
                <div class="w-10 h-10 bg-amber-50 rounded-2xl flex items-center justify-center text-amber-500">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                </div>
                <span class="text-[10px] font-black uppercase text-slate-600">Withdrawals</span>
            </button>
            <button onclick="showSection('team')" class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex flex-col items-center gap-2 hover:bg-slate-50 transition-all">
                <div class="w-10 h-10 bg-purple-50 rounded-2xl flex items-center justify-center text-purple-500">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                </div>
                <span class="text-[10px] font-black uppercase text-slate-600">My Team</span>
            </button>
        </div>

        <div id="section_container" class="space-y-4">
             </div>

        <button onclick="logout()" class="w-full mt-10 text-slate-400 text-[10px] font-black uppercase tracking-widest hover:text-red-500 transition-all">
            Sign Out Account
        </button>
    </div>

    <div id="tier_modal" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[1000] hidden overflow-y-auto p-6">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-white font-black text-xl uppercase italic">Select Tier</h3>
                <button onclick="closeTierModal()" class="text-white/50 hover:text-white">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="tier_list" class="space-y-4 pb-20"></div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex justify-around items-center p-4 z-50 shadow-lg">
        <a href="dashboard.html" class="flex flex-col items-center gap-1 text-slate-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            <span class="text-[8px] font-black uppercase">Home</span>
        </a>
        <a href="deposit.html" class="flex flex-col items-center gap-1 text-slate-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            <span class="text-[8px] font-black uppercase">Deposit</span>
        </a>
        <a href="products.html" class="flex flex-col items-center gap-1 text-slate-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
            <span class="text-[8px] font-black uppercase">Invest</span>
        </a>
        <a href="withdraw.html" class="flex flex-col items-center gap-1 text-slate-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
            <span class="text-[8px] font-black uppercase">Withdraw</span>
        </a>
        <a href="account.html" class="flex flex-col items-center gap-1 text-emerald-600">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <span class="text-[8px] font-black uppercase">Account</span>
        </a>
    </nav>

    <script>
        const _supabase = supabase.createClient('https://sbxtpvuieiokjawltqjq.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNieHRwdnVpZWlva2phd2x0cWpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MDEwMzEsImV4cCI6MjA5Mzk3NzAzMX0.G-BtkLvLgswoxhQlRS7k68ykHb9EUWBrXSg1PVq3pgY');

        const tierData = [
            { level: 1, name: "TIER 1", daily: "150", products: "Bronze Products", maxW: "5k", times: "2x Daily", price: "Free" },
            { level: 2, name: "TIER 2", daily: "250", products: "Bronze & Silver", maxW: "15k", times: "4x Daily", price: "3,000" },
            { level: 3, name: "TIER 3", daily: "500", products: "Bronze, Silver & Gold", maxW: "25k", times: "6x Daily", price: "5,000" },
            { level: 4, name: "TIER 4", daily: "800", products: "Bronze, Silver, Gold & Diamond", maxW: "150k", times: "10x Daily", price: "8,000" },
            { level: 5, name: "TIER 5", daily: "1,200", products: "All Available Products", maxW: "Unlimited", times: "Unlimited", price: "12,000" }
        ];

        let currentUser = null;
        let allInvestments = []; // Store to allow instant toggling

        async function initAccount() {
            const phone = localStorage.getItem('userPhone');
            if (!phone) { window.location.href = "index.html"; return; }

            const { data, error } = await _supabase.from('profiles').select('*').eq('phone', phone).single();
            
            if (data) {
                currentUser = data;
                document.getElementById('acc_balance').innerText = `₦${Number(data.balance || 0).toLocaleString()}`;
                document.getElementById('total_income').innerText = `₦${Number(data.total_income || 0).toLocaleString()}`;
                document.getElementById('current_tier_badge').innerText = `Tier ${data.tier || 1}`;
                showSection('products'); 
            }
        }

        async function showSection(type) {
            const container = document.getElementById('section_container');
            container.innerHTML = '<div class="text-center py-10 animate-pulse font-black text-[10px] text-slate-400 tracking-widest">SYNCING...</div>';

            try {
                if (type === 'products') {
                    const { data } = await _supabase.from('investments').select('*, products(name)').eq('user_id', currentUser.id);
                    allInvestments = data || [];
                    renderProductList('active'); // Default to active
                } 
                else if (type === 'deposits') {
                    const { data } = await _supabase.from('deposits').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
                    container.innerHTML = `<h2 class="text-[10px] font-black text-slate-400 uppercase mb-4 px-2">Deposit History</h2>` + 
                    ((data && data.length > 0) ? data.map(d => `
                        <div class="bg-white p-5 rounded-3xl border border-slate-100 flex justify-between items-center mb-2">
                            <div><p class="font-black text-slate-800 text-sm">₦${Number(d.amount).toLocaleString()}</p><p class="text-[9px] text-slate-400 font-bold">${new Date(d.created_at).toLocaleDateString()}</p></div>
                            <span class="text-[9px] font-black uppercase px-3 py-1 rounded-full ${d.status === 'approved' ? 'bg-emerald-50 text-emerald-500' : 'bg-amber-50 text-amber-700'}">${d.status}</span>
                        </div>
                    `).join('') : '<p class="text-center text-slate-400 text-[10px] font-bold uppercase py-10">No Deposit History</p>');
                } 
                else if (type === 'withdrawals') {
                    const { data } = await _supabase.from('withdrawals').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
                    container.innerHTML = `<h2 class="text-[10px] font-black text-slate-400 uppercase mb-4 px-2">Withdrawal History</h2>` +
                    ((data && data.length > 0) ? data.map(w => `
                        <div class="bg-white p-5 rounded-3xl border border-slate-100 flex justify-between items-center mb-2">
                            <div><p class="font-black text-slate-800 text-sm">₦${Number(w.amount).toLocaleString()}</p><p class="text-[9px] text-slate-400 font-bold">${new Date(w.created_at).toLocaleDateString()}</p></div>
                            <span class="text-[9px] font-black uppercase px-3 py-1 rounded-full ${w.status === 'success' ? 'bg-emerald-50 text-emerald-500' : 'bg-amber-50 text-amber-700'}">${w.status}</span>
                        </div>
                    `).join('') : '<p class="text-center text-slate-400 text-[10px] font-bold uppercase py-10">No Withdrawal History</p>');
                } 
                else if (type === 'team') {
                    const { data: team } = await _supabase.from('profiles').select('*').eq('referred_by', currentUser.id);
                    container.innerHTML = `
                        <div class="bg-slate-900 p-6 rounded-[2rem] text-white mb-4">
                            <p class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest">Referral Stats</p>
                            <p class="text-2xl font-black mt-1">Total Members: ${team?.length || 0}</p>
                        </div>
                        ${team && team.length > 0 ? team.map(m => `
                            <div class="bg-white p-4 rounded-2xl border border-slate-100 flex justify-between items-center mb-2">
                                <p class="font-black text-xs text-slate-800">${m.phone.substring(0,6)}***</p>
                                <span class="text-[9px] font-black bg-slate-100 text-slate-500 px-3 py-1 rounded-lg uppercase">Tier ${m.tier || 1}</span>
                            </div>
                        `).join('') : '<p class="text-center text-slate-400 text-[10px] font-bold uppercase py-10">No Team Members Yet</p>'}
                    `;
                }
            } catch (e) {
                container.innerHTML = '<p class="text-center text-red-400 text-[10px] font-black uppercase">SYNC ERROR</p>';
            }
        }

        function renderProductList(status) {
            const container = document.getElementById('section_container');
            const filtered = allInvestments.filter(i => i.status === status);
            const activeCount = allInvestments.filter(i => i.status === 'active').length;
            const expiredCount = allInvestments.filter(i => i.status === 'expired').length;

            container.innerHTML = `
                <div class="flex items-center justify-between mb-4 px-2">
                    <h2 class="text-[10px] font-black text-slate-800 uppercase tracking-tighter">Investment Assets</h2>
                    <div class="flex bg-slate-200 p-1 rounded-xl">
                        <button onclick="renderProductList('active')" class="px-4 py-1.5 rounded-lg text-[9px] font-black uppercase transition-all ${status === 'active' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500'}">Active (${activeCount})</button>
                        <button onclick="renderProductList('expired')" class="px-4 py-1.5 rounded-lg text-[9px] font-black uppercase transition-all ${status === 'expired' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500'}">Expired (${expiredCount})</button>
                    </div>
                </div>

                <div class="space-y-4">
                    ${filtered.length > 0 ? filtered.map(i => `
                        <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 relative overflow-hidden">
                            ${status === 'active' ? '<div class="absolute top-0 right-0 w-16 h-16 bg-emerald-500/10 blur-2xl rounded-full"></div>' : ''}
                            
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h3 class="font-black text-slate-800 text-sm uppercase">${i.products?.name || 'Investment Plan'}</h3>
                                    <p class="text-[9px] font-bold text-slate-400 uppercase">Started: ${new Date(i.start_date).toLocaleDateString()}</p>
                                </div>
                                <span class="text-[8px] font-black ${status === 'active' ? 'text-emerald-600 bg-emerald-50' : 'text-rose-500 bg-rose-50'} px-3 py-1 rounded-lg uppercase">
                                    ${status}
                                </span>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div class="bg-slate-50 p-4 rounded-2xl">
                                    <p class="text-[8px] font-black text-slate-400 uppercase mb-1">Daily Return</p>
                                    <p class="text-emerald-600 font-black text-sm">₦${Number(i.daily_return).toLocaleString()}</p>
                                </div>
                                <div class="bg-slate-50 p-4 rounded-2xl">
                                    <p class="text-[8px] font-black text-slate-400 uppercase mb-1">Total Earned</p>
                                    <p class="text-slate-800 font-black text-sm">₦${Number(i.total_earned || 0).toLocaleString()}</p>
                                </div>
                            </div>

                            <div class="mt-4 flex items-center justify-between px-1">
                                <p class="text-[8px] font-bold text-slate-400 uppercase">Expires: ${new Date(i.expiry_date).toLocaleDateString()}</p>
                                ${status === 'active' ? `
                                <div class="flex items-center gap-1">
                                    <div class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></div>
                                    <p class="text-[8px] font-black text-emerald-600 uppercase">Earning Active</p>
                                </div>` : '<p class="text-[8px] font-black text-rose-400 uppercase">Completed</p>'}
                            </div>
                        </div>
                    `).join('') : `<p class="text-center text-slate-400 text-[10px] font-bold uppercase py-10">No ${status} Products found</p>`}
                </div>
            `;
        }

        function openTierModal() {
            const modal = document.getElementById('tier_modal');
            const list = document.getElementById('tier_list');
            modal.classList.remove('hidden');
            const userTier = currentUser ? (currentUser.tier || 1) : 1;

            list.innerHTML = tierData.map(t => `
                <div class="tier-card p-6 rounded-[2rem] border ${userTier === t.level ? 'bg-emerald-600 border-emerald-400 text-white' : 'bg-white/5 border-white/10 text-white'} mb-4">
                    <div class="flex justify-between items-center mb-4">
                        <h4 class="font-black text-lg">${t.name}</h4>
                        <span class="text-[10px] font-black uppercase opacity-70">${t.price === 'Free' ? 'Free' : '₦'+t.price}</span>
                    </div>
                    <ul class="space-y-2 text-[11px] font-bold opacity-80 mb-6">
                        <li>• Daily Bonus: ₦${t.daily}</li>
                        <li>• Access: ${t.products}</li>
                        <li>• Max Withdraw: ₦${t.maxW}</li>
                        <li>• Limits: ${t.times}</li>
                    </ul>
                    ${userTier === t.level 
                        ? '<div class="text-center font-black text-xs tracking-widest py-3 border border-white/20 rounded-xl">CURRENT TIER</div>'
                        : `<button onclick="window.location.href='deposit.html'" class="w-full bg-white text-slate-900 py-3 rounded-xl font-black text-xs uppercase">Upgrade Now</button>`
                    }
                </div>
            `).join('');
        }

        function closeTierModal() { document.getElementById('tier_modal').classList.add('hidden'); }
        function logout() { localStorage.clear(); window.location.href = "index.html"; }

        window.onload = initAccount;
    </script>
</body>
</html>
