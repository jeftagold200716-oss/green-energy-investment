<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit Funds | Green Energy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .solar-gradient { background: linear-gradient(135deg, #059669 0%, #10b981 100%); }
        .nav-item { color: #94a3b8; transition: all 0.2s; }
        .active-nav { color: #059669; }
    </style>
</head>
<body class="pb-32">

    <div class="max-w-md mx-auto p-6 space-y-6">
        <h2 class="text-2xl font-black text-slate-800">Wallet Funding</h2>
        
        <div class="bg-slate-900 rounded-[2.5rem] p-8 text-white relative overflow-hidden shadow-2xl">
            <div class="absolute -right-6 -top-6 w-32 h-32 bg-emerald-500/20 rounded-full blur-3xl"></div>
            <p class="text-[10px] font-black text-emerald-400 uppercase tracking-[0.3em] mb-6">Official Receiving Account</p>
            
            <div class="space-y-6 relative z-10">
                <div>
                    <span class="text-[9px] text-slate-500 uppercase font-black block mb-1">Bank Partner</span>
                    <span class="text-lg font-bold">OPAY MICROBANK</span>
                </div>
                
                <div>
                    <span class="text-[9px] text-slate-500 uppercase font-black block mb-1">Account Number</span>
                    <div class="flex items-center justify-between bg-white/5 p-4 rounded-2xl border border-white/10 mt-1">
                        <span id="accNum" class="text-2xl font-black tracking-widest text-emerald-50">8148868032</span>
                        <button onclick="copyAccount()" class="bg-emerald-500 hover:bg-emerald-600 px-4 py-2 rounded-xl text-[10px] font-black transition-all shadow-lg shadow-emerald-900/50">COPY</button>
                    </div>
                </div>
                
                <div>
                    <span class="text-[9px] text-slate-500 uppercase font-black block mb-1">Beneficiary Name</span>
                    <span class="text-sm font-bold uppercase tracking-tight">ADEYA JEPHTHAH</span>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-100">
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Amount to Deposit (₦)</label>
                    <input type="number" id="deposit_amount" placeholder="Min 1,000" 
                           class="w-full p-5 rounded-2xl bg-slate-50 border-none font-black text-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all">
                </div>

                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Sender's Full Name</label>
                    <input type="text" id="sender_name" placeholder="Name on your bank app" 
                           class="w-full p-5 rounded-2xl bg-slate-50 border-none font-bold text-sm focus:ring-2 focus:ring-emerald-500 outline-none transition-all">
                </div>

                <div class="bg-amber-50 p-4 rounded-2xl border border-amber-100">
                    <p class="text-[9px] font-bold text-amber-700 leading-relaxed uppercase">
                        ⚠️ Transfer the money first, then click the button below to send screenshot of the transaction via WhatsApp.
                    </p>
                </div>

                <button onclick="requestDeposit()" class="w-full solar-gradient text-white font-black py-5 rounded-2xl shadow-xl shadow-emerald-100 active:scale-95 transition-all flex items-center justify-center gap-3">
                    <img src="https://img.icons8.com/color/24/whatsapp.png" alt="WA"/>
                    SUBMIT & SEND PROOF
                </button>
            </div>
        </div>

        <a href="dashboard.html" class="block text-center text-slate-400 text-[10px] font-black uppercase tracking-widest">Cancel Transaction</a>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-slate-100 flex justify-around items-center p-4 z-[999] shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
        <a href="dashboard.html" class="nav-item flex flex-col items-center gap-1 transition-all active:scale-90">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <span class="text-[9px] font-black uppercase tracking-tighter">Home</span>
        </a>
        <a href="deposit.html" class="nav-item active-nav flex flex-col items-center gap-1 transition-all active:scale-90">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            <span class="text-[9px] font-black uppercase tracking-tighter">Deposit</span>
        </a>
        <a href="withdraw.html" class="nav-item flex flex-col items-center gap-1 transition-all active:scale-90">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            <span class="text-[9px] font-black uppercase tracking-tighter">Withdraw</span>
        </a>
        <a href="products.html" class="nav-item flex flex-col items-center gap-1 transition-all active:scale-90">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
            <span class="text-[9px] font-black uppercase tracking-tighter">Invest</span>
        </a>
        <a href="account.html" class="nav-item flex flex-col items-center gap-1 transition-all active:scale-90">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            <span class="text-[9px] font-black uppercase tracking-tighter">Account</span>
        </a>
    </nav>

    <script>
        const _supabase = supabase.createClient('https://sbxtpvuieiokjawltqjq.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNieHRwdnVpZWlva2phd2x0cWpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MDEwMzEsImV4cCI6MjA5Mzk3NzAzMX0.G-BtkLvLgswoxhQlRS7k68ykHb9EUWBrXSg1PVq3pgY');

        function copyAccount() {
            const num = document.getElementById('accNum').innerText;
            navigator.clipboard.writeText(num);
            alert("Account Number Copied!");
        }

        async function requestDeposit() {
            const amount = document.getElementById('deposit_amount').value;
            const sender = document.getElementById('sender_name').value;
            
            if (amount < 1000) return alert("Minimum deposit is ₦1,000");
            if (!sender) return alert("Please enter the sender's name");

            const { data: { user } } = await _supabase.auth.getUser();
            const phone = user.email.replace('@phone.com', '');

            const { error } = await _supabase.from('deposits').insert([
                { user_id: user.id, amount: amount, phone_number: phone, status: 'pending', reference: `Manual-${sender}` }
            ]);

            if (error) return alert(error.message);

            // WhatsApp formatting
            const message = `⚡ *NEW DEPOSIT LOGGED*%0A%0A` +
                            `👤 *Sender:* ${sender}%0A` +
                            `💰 *Amount:* ₦${Number(amount).toLocaleString()}%0A` +
                            `📱 *User ID:* ${phone}%0A%0A` +
                            `_Attached is my proof of payment._`;

            window.location.href = `https://wa.me/237698771429?text=${message}`;
        }
    </script>
</body>
</html>
