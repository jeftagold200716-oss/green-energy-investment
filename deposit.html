   <script>
   const _supabase = supabase.createClient('https://sbxtpvuieiokjawltqjq.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNieHRwdnVpZWlva2phd2x0cWpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MDEwMzEsImV4cCI6MjA5Mzk3NzAzMX0.G-BtkLvLgswoxhQlRS7k68ykHb9EUWBrXSg1PVq3pgY');

    function copyAccount() {
        const num = document.getElementById('accNum').innerText;
        navigator.clipboard.writeText(num);
        alert("Account Number Copied!");
    }

    async function submitDepositRequest() {
        const phone = localStorage.getItem('userPhone');
        const amountInput = document.getElementById('deposit_amount');
        const senderInput = document.getElementById('sender_name');
        const btn = event.currentTarget;

        if (!phone) {
            alert("Session expired. Please login again.");
            window.location.href = 'login.html';
            return;
        }

        if (!amountInput.value || !senderInput.value) {
            alert("Please fill in both the amount and your bank name.");
            return;
        }

        const amount = amountInput.value;
        const senderBankName = senderInput.value;

        btn.innerText = "SENDING REQUEST...";
        btn.disabled = true;

        try {
            // STEP 1: Search for the profile
            const { data: profiles, error: profileError } = await _supabase
                .from('profiles')
                .select('full_name, id') 
                .eq('phone', phone);

            if (profileError) throw profileError;

            // SAFETY CHECK: Use the first profile found, or set to null
            const profile = (profiles && profiles.length > 0) ? profiles[0] : null;
            
            // Extract the ID safely. If no profile, we use null for user_id
            const userId = profile ? profile.id : null;
            const accountName = profile ? profile.full_name : "User (" + phone + ")";

            // STEP 2: Save to 'deposits' table
            const { error: depositError } = await _supabase
                .from('deposits')
                .insert([{
                    user_id: userId, // This won't crash now even if userId is null
                    phone: phone,
                    user_name: accountName,
                    sender_name: senderBankName,
                    amount: parseFloat(amount),
                    status: 'pending'
                }]);

            if (depositError) throw depositError;

            // STEP 3: WhatsApp Logic
            const adminWhatsApp = "237698771429"; 
            const message = `*NEW DEPOSIT REQUEST*%0A%0A` +
                            `*Account Name:* ${accountName}%0A` +
                            `*Bank Sender Name:* ${senderBankName}%0A` +
                            `*Phone:* ${phone}%0A` +
                            `*Amount:* ₦${Number(amount).toLocaleString()}%0A%0A` +
                            `I have made the transfer. Sending screenshot now!`;

            window.location.href = `https://wa.me/${adminWhatsApp}?text=${message}`;

        } catch (err) {
            console.error("Deposit Error:", err);
            alert("System Error: " + err.message);
            btn.innerText = "SUBMIT & SEND PROOF";
            btn.disabled = false;
        }
    }
    async function fetchHistory() {
        const phone = localStorage.getItem('userPhone');
        if (!phone) return;

        const { data: user } = await _supabase.from('profiles').select('id').eq('phone', phone).single();
        if (!user) return;

        const { data: history, error } = await _supabase
            .from('deposits')
            .select('*')
            .eq('user_id', user.id)
            .order('created_at', { ascending: false });

        const list = document.getElementById('history-list');
        if (error || !history || history.length === 0) {
            list.innerHTML = `<p class="text-[10px] text-slate-400 text-center py-4 uppercase">No records found</p>`;
            return;
        }

        list.innerHTML = history.map(item => `
            <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border border-slate-100">
                <div>
                    <p class="font-black text-slate-800 text-sm">₦${Number(item.amount).toLocaleString()}</p>
                    <p class="text-[8px] text-slate-400 uppercase font-bold">${new Date(item.created_at).toLocaleDateString()}</p>
                </div>
                <span class="px-3 py-1 rounded-full text-[8px] font-black uppercase ${
                    item.status === 'approved' ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'
                }">
                    ${item.status}
                </span>
            </div>
        `).join('');
    }

    window.onload = fetchHistory;
    // Function to load history using phone number from localStorage
    async function fetchHistory() {
        const phone = localStorage.getItem('userPhone');
        if (!phone) return;

        // Get ID first
        const { data: user } = await _supabase.from('profiles').select('id').eq('phone', phone).single();
        if (!user) return;

        const { data: history, error } = await _supabase
            .from('deposits')
            .select('*')
            .eq('user_id', user.id)
            .order('created_at', { ascending: false });

        const list = document.getElementById('history-list');
        if (error || !history || history.length === 0) {
            list.innerHTML = `<p class="text-[10px] text-slate-400 text-center py-4 uppercase">No records found</p>`;
            return;
        }

        list.innerHTML = history.map(item => `
            <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border border-slate-100">
                <div>
                    <p class="font-black text-slate-800 text-sm">₦${Number(item.amount).toLocaleString()}</p>
                    <p class="text-[8px] text-slate-400 uppercase font-bold">${new Date(item.created_at).toLocaleDateString()}</p>
                </div>
                <span class="px-3 py-1 rounded-full text-[8px] font-black uppercase ${
                    item.status === 'approved' ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'
                }">
                    ${item.status}
                </span>
            </div>
        `).join('');
    }

    // Load history when page opens
    window.onload = fetchHistory;
